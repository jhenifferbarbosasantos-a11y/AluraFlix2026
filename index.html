<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <title>Guiminamflix</title>
    <style>
        /* Variáveis de Cores e Estilo Globais */
        :root {
            --bg-color: #0d0d13;
            --container-bg: #151521;
            --primary-color: #e50914;
            --primary-hover: #ff1e27;
            --text-color: #ffffff;
            --text-secondary: #9ca3af;
            --accent-glow: rgba(229, 9, 20, 0.4);
            --font-main: 'Chakra Petch', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            line-height: 1.6;
            overflow-x: hidden;
            padding-bottom: 50px;
        }

        /* Header Moderno */
        header {
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
            padding: 20px 4%;
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-color);
            text-shadow: 0 0 10px var(--accent-glow);
            letter-spacing: 2px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid rgba(255, 255, 255, 0.05);
        }

        .header-logo {
            text-decoration: none;
            color: inherit;
            transition: transform 0.3s ease;
        }

        .header-logo:hover {
            transform: scale(1.05);
        }

        /* Seção Chamada (Hero / Destaque) */
        .chamada {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            gap: 30px;
            padding: 40px 4%;
            background: radial-gradient(circle at top right, rgba(229, 9, 20, 0.15), transparent 60%);
            border-radius: 16px;
            margin: 20px 4%;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        @media (min-width: 992px) {
            .chamada {
                flex-direction: row;
                padding: 60px 5%;
            }
        }

        .chamada-texto {
            flex: 1;
            max-width: 500px;
        }

        .chamada-texto h1 {
            font-size: 2.5rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 15px;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @media (min-width: 768px) {
            .chamada-texto h1 {
                font-size: 3.5rem;
            }
        }

        .chamada-texto p {
            font-size: 1.1rem;
            color: var(--primary-color);
            background-color: rgba(229, 9, 20, 0.15);
            display: inline-block;
            padding: 5px 15px;
            border-radius: 50px;
            font-weight: 600;
            border: 1px solid var(--primary-color);
            margin-top: 10px;
        }

        /* Container do Player de Vídeo */
        .player-wrapper {
            position: relative;
            width: 100%;
            max-width: 560px;
            aspect-ratio: 16/9;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px var(--accent-glow);
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease;
        }

        .player-wrapper:hover {
            transform: scale(1.02);
        }

        .player-wrapper iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* Seção de Categorias e Grid de Vídeos */
        .categoria {
            padding: 40px 4%;
        }

        .categoria h2 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            font-weight: 600;
            position: relative;
            padding-left: 15px;
        }

        .categoria h2::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 5px;
            height: 80%;
            background-color: var(--primary-color);
            border-radius: 4px;
            box-shadow: 0 0 10px var(--primary-color);
        }

        /* Carrossel/Grid Responsivo de Thumbnails */
        .categoria-videos {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding: 15px 5px;
            scroll-behavior: smooth;
            scrollbar-width: thin;
            scrollbar-color: var(--primary-color) var(--container-bg);
        }

        /* Customização da barra de rolagem para navegadores Webkit */
        .categoria-videos::-webkit-scrollbar {
            height: 8px;
        }

        .categoria-videos::-webkit-scrollbar-track {
            background: var(--container-bg);
            border-radius: 10px;
        }

        .categoria-videos::-webkit-scrollbar-thumb {
            background-color: var(--primary-color);
            border-radius: 10px;
            border: 2px solid var(--container-bg);
        }

        /* Item de Vídeo (Card) */
        .video-card {
            flex: 0 0 240px;
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            background-color: var(--container-bg);
        }

        @media (min-width: 768px) {
            .video-card {
                flex: 0 0 280px;
            }
        }

        .video-card:hover {
            transform: translateY(-5px) scale(1.03);
            border-color: var(--primary-color);
            box-shadow: 0 8px 20px rgba(229, 9, 20, 0.3);
        }

        .video-card img {
            width: 100%;
            height: auto;
            display: block;
            transition: opacity 0.3s ease;
        }

        /* Filtro escuro e ícone Play ao passar o mouse */
        .video-card::after {
            content: '▶';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            font-size: 2.5rem;
            color: #fff;
            opacity: 0;
            transition: all 0.3s ease;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
            z-index: 2;
        }

        .video-card:hover::after {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .video-card:hover img {
            opacity: 0.7;
        }

        /* Rodapé Fixo Prático */
        footer {
            text-align: center;
            padding: 30px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 40px;
        }
    </style>
</head>

<body>
    <!-- Cabeçalho Principal -->
    <header>
        <a href="#" class="header-logo" onclick="resetDestaque()">GUIMINAMFLIX</a>
    </header>

    <!-- Banner Destaque Principal -->
    <section class="chamada">
        <div class="chamada-texto">
            <h1 id="titulo-destaque">ATRAVÉS DO ARANHAVERSO</h1>
            <p id="tag-destaque">#homem-aranha</p>
        </div>

        <div class="player-wrapper">
            <iframe id="video-player" 
                    src="https://www.youtube.com/embed/gt_fAE1Eg2Q?si=EEv-tsY_b1B2OwKE" 
                    title="YouTube video player" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    referrerpolicy="strict-origin-when-cross-origin" 
                    allowfullscreen>
            </iframe>
        </div>
    </section>

    <!-- Linha de Catálogo Interativa -->
    <section class="categoria">
        <h2>Filmes e séries sugeridos</h2>
        <div class="categoria-videos">
            
            <!-- Vídeo 1 -->
            <div class="video-card" 
                 data-video-id="cs15QqG6Gjc" 
                 data-titulo="Homem-Aranha Sem Volta Para Casa" 
                 data-tag="#multiverso">
                <img src="https://img.youtube.com/vi/cs15QqG6Gjc/maxresdefault.jpg" alt="Trailer 1" />
            </div>

            <!-- Vídeo 2 -->
            <div class="video-card" 
                 data-video-id="nCmIwcycUJ8" 
                 data-titulo="Spider-Man: Miles Morales - PS5" 
                 data-tag="#games">
                <img src="https://img.youtube.com/vi/nCmIwcycUJ8/maxresdefault.jpg" alt="Trailer 2" />
            </div>

            <!-- Vídeo 3 -->
            <div class="video-card" 
                 data-video-id="FvRmEapoHRc" 
                 data-titulo="Batman: The Batman - Trailer" 
                 data-tag="#dc-comics">
                <img src="https://img.youtube.com/vi/FvRmEapoHRc/maxresdefault.jpg" alt="Trailer 3" />
            </div>

            <!-- Vídeo 4 -->
            <div class="video-card" 
                 data-video-id="Ipkw_hWW-Hw" 
                 data-titulo="Doutor Estranho no Multiverso da Loucura" 
                 data-tag="#mago-supremo">
                <img src="https://img.youtube.com/vi/Ipkw_hWW-Hw/maxresdefault.jpg" alt="Trailer 4" />
            </div>

            <!-- Vídeo 5 -->
            <div class="video-card" 
                 data-video-id="d4DzMNGoyis" 
                 data-titulo="Guardiões da Galáxia Vol. 3" 
                 data-tag="#espacial">
                <img src="https://img.youtube.com/vi/d4DzMNGoyis/maxresdefault.jpg" alt="Trailer 5" />
            </div>

        </div>
    </section>

    <footer>
        <p>&copy; 2026 Guiminamflix - Todos os direitos reservados.</p>
    </footer>

    <script>
        // Função para carregar dinamicamente um vídeo na área de destaque ao clicar no card
        const videoCards = document.querySelectorAll('.video-card');
        const mainPlayer = document.getElementById('video-player');
        const mainTitle = document.getElementById('titulo-destaque');
        const mainTag = document.getElementById('tag-destaque');

        // Guarda as informações do vídeo padrão (Spider-Man) para quando clicar no logo
        const defaultVideo = {
            id: 'gt_fAE1Eg2Q?si=EEv-tsY_b1B2OwKE',
            titulo: 'ATRAVÉS DO ARANHAVERSO',
            tag: '#homem-aranha'
        };

        videoCards.forEach(card => {
            card.addEventListener('click', () => {
                const videoId = card.getAttribute('data-video-id');
                const titulo = card.getAttribute('data-titulo');
                const tag = card.getAttribute('data-tag');

                // Atualiza o src do iframe principal
                mainPlayer.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
                
                // Atualiza os textos com efeitos suaves
                mainTitle.textContent = titulo;
                mainTag.textContent = tag;

                // Rola suavemente até o player principal
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            });
        });

        // Retorna ao estado inicial quando clica na Logo do Guiminamflix
        function resetDestaque() {
            mainPlayer.src = `https://www.youtube.com/embed/${defaultVideo.id}`;
            mainTitle.textContent = defaultVideo.titulo;
            mainTag.textContent = defaultVideo.tag;
        }
    </script>
</body>

</html>
